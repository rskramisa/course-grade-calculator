<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSU Course Grade Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="style.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4 p-md-5">
            <main>
                <div class="beginning-text mb-3 text-center">
                    <h1 class="mb-3">Welcome!</h1>
                    <h2 class="mb-4">Let's calculate your course grade!</h2>
                </div>

                <section class="mb-4">
                    <h3 class="h5 fw-bold text-dark mb-4">
                        Please enter your course details:
                    </h3>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle text-center blueprint-table">
                            <thead class="table-light text-secondary small uppercase fw-bold">
                                <tr>
                                    <th scope="col" style="width: 35%;">Segment</th>
                                    <th scope="col" style="width: 25%;">Count</th>
                                    <th scope="col" style="width: 25%;">Percentage</th>
                                    <th scope="col" style="width: 15%;">Remove</th>
                                </tr>
                            </thead>
                            <tbody id="segment-container">
                                <tr class="blueprint-container">
                                    <td>
                                        <input type="text" class="form-control" placeholder="example: Attendance">
                                    </td>
                                    <td>
                                        <input type="number" class="form-control" placeholder="example: 1" min="1">
                                    </td>
                                    <td>
                                        <div class="input-group">
                                            <input type="number" class="form-control" placeholder="example: 10" min="0" max="100">
                                            <span class="input-group-text bg-white">%</span>
                                        </div>
                                    </td>
                                    <td>
                                        <button type="button" class="btn btn-outline-danger remove-btn shadow-sm">
                                            <i class="bi bi-trash3-fill pointer-events-none"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <div class="d-flex justify-content-center gap-3 mb-5">
                    <button type="button" class="btn btn-outline-primary add-row-btn px-4 py-2 shadow-sm fw-semibold">
                        <i class="bi bi-plus-circle me-2"></i>Add Row
                    </button>
                    <button type="button" class="btn btn-success finalise-btn px-4 py-2 shadow-sm fw-bold">
                        <i class="bi bi-check-circle me-2"></i>Finalise Breakdown!
                    </button>
                </div>

                <section id="marks-input-section" class="mt-4 pt-4 border-top" style="display: none;"></section>
            </main>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</footer>

</body>
</html>
